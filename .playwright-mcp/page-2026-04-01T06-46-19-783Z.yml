          - paragraph [ref=e70]: "\"Work with Confidence, Reap in Joy\"‌ ‍ ‍‍‌‍ ‌ ‍‌‍‍‌‌‍‌ ‌‍‍‌‌‍ ‍‍‍ ‍‍‍‍‌ ‌‍‌‌‍ ‍‌‍‍‌‌ ‌‌ ‍‌‍ ‍‌‍‍‌‌‍ ‍‍‍ ‍‍‌‍‍‌ ‍‌‍‌‌‌‍‌‍‍‍ ‍‍‍‍‌‍‍‌ ‌‌ ‌‌ ‍‍‍ ‍ ‌‍ ‌‍ ‌‍ ‌‍‌‌‍ ‌‍‍‌‍ ‌ ‌ ‌ ‍‍ ‍ ‌‍‍‌‌‍ ‍‌ ‌‌‍‌‌‌‍ ‍‌ ‌‍ ‌‍‌‌‌‍‌‌‍‍‌‌ ‌‍ ‌‍ ‌‌‍ ‌‍‌‌‍‌‌ ‌‌ ‌ ‍‌‍‌‌‌ ‌‍‌‌‌‍ ‍‌ ‌‌‍‌‌ ‌‌‍‍‌‌‍ ‌‍ ‍ ‍ ‌‍‍‌‌‍‌ ‌‌‍‌‌‍‍‌‍ ‌ ‌‌‌ ‌‌‌‌‍‌‌‍‌ ‌‍‌‌ ‍ ‌ ‌‌ ‍‌‌ ‌‍‌‌ ‌‌‍‌‌‍‍‌‍ ‌ ‌‌‌ ‌‌‌‌‍‌‌‍‌ ‌‍‌‌ ‍ ‌ ‌‍‌‌ ‌‌‍‍ ‌‌ ‌ ‌‌‍ ‌ ‍‌ ‍‌‌ ‌‍‌‌ ‍‌‍‌‌ ‍‌‌ ‌‌‌‍‌‌ ‌‍‍ ‌‍‌‌‌ ‍‌‍‌‌ ‌‌‍‌‌ ‌‌‍‌‌ ‍ ‍‌‍ ‌‍‌‌ ‍‌‍‌‍ ‌‌ ‌‍ ‌‍ ‌‍‌ ‌‍‌‌‍ ‍‍‌‌ ‍ ‍‍‌‌ ‌‌‌‌‍ ‍‌ ‌ ‌‌‌‍‍‌ ‌‌‍‍‌‌ ‌‌‍ ‌‍‌‌ ‌‍‍‌‍‌‌ ‌‍‌‌‌‌‌‌‌ ‍‌‍ ‌‌‍‍‌ ‌‌ ‌‌ ‍‌‌ ‌‌‍‌‌ ‍‌‌‍‍‌‌ ‍‌‌‍‌‍ ‌‍ ‌‍ ‌‍‌‌‍ ‌‍‍‌‍ ‌ ‌ ‌‍‌‌ ‌‌ ‍‌‍‌‍‍‌‌‍‌ ‌‌‍‌‌‍‍‌‍ ‌ ‌‌‌ ‌‌‌‌‍‌‌‍‌ ‌‍‌‌‍‌‍‌ ‌‌ ‍‌‌ ‌‍‌‌ ‌‌‍‌‌‍‍‌‍ ‌ ‌‌‌ ‌‌‌‌‍‌‌‍‌ ‌‍‌‌‍‌‍‌ ‌‍‌‌ ‌‌‍‍ ‌‌ ‌ ‌‌‍ ‌ ‍‌ ‍‌‌ ‌‍‌‌ ‍‌‍‌‌ ‍‌‌ ‌‌‌‍‌‌ ‌‍‍ ‌‍‌‌‌ ‍‌‍‌‌ ‌‌‍‌‌ ‌‌‍‌‌ ‍ ‍‌‍ ‌‍‌‌ ‍‌‍‌‍ ‌‌ ‌‍ ‌‍ ‌‍‌ ‌‍‌‌‍ ‍‍‌‌ ‍ ‍‍‌‌ ‌‌‌‌‍ ‍‌ ‌ ‌‌‌‍‍‌ ‌‌‍‍‌‌ ‌‌‍ ‌‍‌‌‍‌‍‌ ‌‍‌‌‌ ‍‌ ‌ ‌‍‌‌‌‍ ‌ ‌‌‍‍‌‌ ‌‍‌‍‌‌ ‌‌ ‌ ‌‌‌‍‍‌‍ ‌‍‍‌‌ ‌‍‍‌‍‌‌‌‍‌‍‍‌ ‌"
